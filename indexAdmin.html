<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Panel de Administración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./css/admin.css" />
  <link rel="stylesheet" href="./css/productos.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">

  <img
    src="./assets/imagenes/logo.svg"
    alt="Logo Peticol"
    class="navbar-logo">

    <div class="navbar-title">

  <span class="navbar-subtitle">
    SISTEMA ADMINISTRATIVO
  </span>

  <div class="navbar-heading">

    <h2>🏠 Módulo Principal</h2>

    <span class="navbar-badge">
      Online
    </span>

  </div>

</div>


  <div class="search-container">

        <span class="search-icon">🔍</span>

        <input
          type="text"
          id="searchInput"
          class="navbar-search"
          placeholder="Buscar módulos...">

  </div>

  <button id="logoutBtn" class="btn-logout">
  <span>🚪</span>
  <span>Cerrar sesión</span>
</button>

</header>

<div id="logoModal" class="logo-modal">

  <div class="logo-modal-content">

    <img
      src="./assets/imagenes/logo.svg"
      alt="Logo Peticol"
      class="logo-modal-img">

  </div>

</div>



<!-- CONTENIDO -->
<main class="content">
  <section class="cards">

    <div class="card" data-link="productos.html" data-role="admin-only">
      <img src="./assets/imagenes/productos2.jpg">
      <div class="card-text">Productos</div>
    </div>

    <div class="card" data-link="usuarios.html" data-role="admin-only">
      <img src="./assets/cards/usuarios3.jpg">
      <div class="card-text">Usuarios</div>
    </div>

    <div class="card" data-link="indexVentas.html">
      <img src="https://i.pinimg.com/1200x/22/b5/60/22b5604eca105ae195aa809dc734d071.jpg">
      <div class="card-text">Ventas</div>
    </div>

    <div class="card" data-link="historial.html">
      <img src="https://i.pinimg.com/1200x/0b/8c/f9/0b8cf9bae65559a15f616bece56070c8.jpg">
      <div class="card-text">Historial de ventas</div>
    </div>

    <div class="card" data-link="gastos.html">
      <img src="https://i.pinimg.com/736x/01/f6/48/01f64838522d0c52fc4db623708dc1ee.jpg">
      <div class="card-text">Gastos</div>
    </div>

    <div class="card" data-link="espacio.html" data-role="admin-only">
      <img src="https://i.pinimg.com/1200x/9d/c4/5d/9dc45d0657462013253f0cef77540ec0.jpg">
      <div class="card-text">Almacenamiento</div>
    </div>

     <div class="card" data-link="scanner.html">
      <img src="https://i.pinimg.com/1200x/f7/ee/99/f7ee993d1902f0d5b55efcb6e4f3f01c.jpg">
      <div class="card-text">Scanner</div>
    </div>
    <div class="card" data-link="calendario.html">
      <img src="https://i.pinimg.com/736x/73/7d/b4/737db42fa99f6b07ee9a889d869de430.jpg">
      <div class="card-text">Calendario</div>
    </div>



  </section>
</main>

<script type="module" src="./js/admin.js"></script>

</body>
</html>
